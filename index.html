<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RH DataBase — Annuaire Contacts Maroc</title>
  <meta name="description" content="Base de données RH des entreprises marocaines — contacts, emails, téléphones par secteur et ville." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-title">RH DataBase</span>
        <span class="logo-sub">Annuaire Maroc</span>
      </div>
    </div>
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>

  <div class="sidebar-stats" id="sidebarStats">
    <div class="stat-chip" id="statCompanies"><span class="stat-num">—</span><span class="stat-label">Entreprises</span></div>
    <div class="stat-chip" id="statContacts"><span class="stat-num">—</span><span class="stat-label">Contacts</span></div>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-item active" data-view="list" id="navList">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Annuaire
    </button>
    <button class="nav-item" data-view="map" id="navMap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
      Par Ville
    </button>
    <button class="nav-item" data-view="sectors" id="navSectors">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Par Secteur
    </button>
  </nav>

  <!-- FILTERS -->
  <div class="filter-section">
    <h3 class="filter-title">Filtres</h3>
    <div class="filter-group">
      <label class="filter-label">Ville</label>
      <select id="filterCity" class="filter-select">
        <option value="">Toutes les villes</option>
      </select>
    </div>
    <div class="filter-group">
      <label class="filter-label">Secteur</label>
      <select id="filterSector" class="filter-select">
        <option value="">Tous les secteurs</option>
      </select>
    </div>
    <div class="filter-group">
      <label class="filter-label">Avec Email uniquement</label>
      <label class="toggle-switch">
        <input type="checkbox" id="filterEmail" />
        <span class="toggle-slider"></span>
      </label>
    </div>
    <button class="btn-reset" id="btnReset">Réinitialiser les filtres</button>
    <div class="creator-message">
      created by <a href="https://www.linkedin.com/in/habib-mounirou-726070298/" target="_blank" rel="noopener noreferrer">Mounirou</a>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main-content" id="mainContent">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Rechercher une entreprise, contact, email…" autocomplete="off" />
      <span class="search-clear" id="searchClear" title="Effacer">✕</span>
    </div>
    <div class="topbar-actions">
      <button class="btn-email" id="btnBulkEmail" title="Envoyer un email aux entreprises sélectionnées" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Envoyer Email <span id="bulkEmailCount">(0)</span>
      </button>
      <button class="btn-export" id="btnExport" title="Exporter les résultats en CSV">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </div>
  </header>

  <!-- RESULT COUNT -->
  <div class="result-bar" id="resultBar">
    <div style="display: flex; align-items: center; gap: 12px;">
      <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.85rem; color: var(--text2);" title="Sélectionner / Désélectionner tout">
        <input type="checkbox" id="selectAllCheckbox" style="accent-color: var(--accent); cursor: pointer; width: 16px; height: 16px;" /> Tout
      </label>
      <span id="resultCount">Chargement…</span>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="viewGrid" title="Vue grille">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </button>
      <button class="view-btn" id="viewList" title="Vue liste">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- VIEWS -->
  <div id="viewList-panel" class="view-panel active">
    <!-- CARDS GRID -->
    <div class="cards-grid" id="cardsGrid"></div>
    <!-- PAGINATION -->
    <div class="pagination" id="pagination"></div>
  </div>

  <div id="viewMap-panel" class="view-panel">
    <div class="city-grid" id="cityGrid"></div>
  </div>

  <div id="viewSectors-panel" class="view-panel">
    <div class="sector-grid" id="sectorGrid"></div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <button class="modal-close" id="modalClose" aria-label="Fermer">✕</button>
    <div class="modal-header">
      <div class="modal-company-icon" id="modalIcon"></div>
      <div class="modal-company-info">
        <h2 class="modal-company-name" id="modalName"></h2>
        <div class="modal-meta">
          <span class="badge badge-city" id="modalCity"></span>
          <span class="badge badge-sector" id="modalSector"></span>
          <span class="badge badge-group" id="modalGroup"></span>
        </div>
      </div>
    </div>
    <div class="modal-body">
      <div class="contacts-list" id="modalContacts"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
